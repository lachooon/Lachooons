<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lachooon's</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fontdiner+Swanky&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

    <div class="grid-container">
        <div id="identity-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center;">
            <div style="background: #18181b; border: 1px solid #333; border-radius: 10px; width: 320px; padding: 20px; color: white; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); font-family: sans-serif;">

                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px;">
                    <h3 style="margin: 0; font-size: 16px; font-family: sans-serif; letter-spacing: normal;">Chat Identity</h3>
                    <button onclick="closeIdentityModal()" style="background: none; border: none; color: #aaa; cursor: pointer; font-size: 16px;">✕</button>
                </div>

                <div>
                    <div style="font-size: 12px; color: #aaa; margin-bottom: 5px;">How do I look?</div>
                    <div style="background: #0e0e10; padding: 10px; border-radius: 6px; font-size: 14px;">
                        <strong id="identity-preview" style="color: #2793e8;">Gość</strong><span style="color: #eee;">: Lachooon, check this out!</span>
                    </div>
                </div>

                <div>
                    <label style="font-size: 12px; color: #aaa; display: block; margin-bottom: 5px;">Your nickname</label>
                    <input type="text" id="nick-input" value="Guest" oninput="updatePreview()" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #444; background: #0e0e10; color: white; font-size: 14px; box-sizing: border-box;">
                </div>

                <div>
                    <label style="font-size: 12px; color: #aaa; display: block; margin-bottom: 5px;">Nickname color</label>
                    <input type="color" id="color-input" value="#2793e8" oninput="updatePreview()" style="width: 100%; height: 40px; border: none; border-radius: 6px; cursor: pointer; background: #0e0e10; padding: 2px;">
                </div>

                <button onclick="saveIdentity()" style="padding: 12px; border-radius: 6px; border: none; background-color: #2793e8; color: white; cursor: pointer; font-weight: bold; margin-top: 5px; transition: 0.2s;">Zapisz</button>
            </div>
        </div>


        <div class="box header">Lachooon's (with triple o)</div>

        <div class="box player-cell">
            <div id="welcome-screen" style="text-align: center;">
                <h2>🎵 Listen-together Room 🎵</h2>
                <p style="color: #aaa;">Queue is empty. Paste your link below to begin!</p>
            </div>
            <div id="player-container" style="position: absolute; left: -9999px; opacity: 0;">
                <div id="player"></div>
            </div>
        </div>

        <div class="box chat-cell">
            <h3 style="margin-top: 0;">Chat</h3>

            <div id="chat-messages" style="flex-grow: 1; width: 100%; overflow-y: auto; background: #111; border-radius: 8px; padding: 10px; margin-bottom: 10px; dispaly: flex; flex-direction: colum; gap: 8px; font-size: 14px; box-sizing: border-box; word-wrap: break-word;">
                <div style="color: #666; text-align: center; font-style: italic;">Welcome to the room!</div>
            </div>

            <div style="display: flex; width: 100%; gap: 10px;">
                <button onclick="openIdentityModal()" style="padding: 10px 12px; border-radius: 8px; border: 1px solid #444; background-color: #2a2a2a; color: #ccc; cursor: pointer; font-size: 16px; transition: 0.2s;" title="Chat Identity">⚙</button>
                <input type="text" id="chat-input" placeholder="Type a message..." style="padding: 10px; font-size: 14px; margin: 0;">
                <button onclick="sendChatMessage()" style="padding: 10px 20px; border-radius: 8px; border: none; background-color: #2793e8; color: white; cursor: pointer; font-family: 'Fontdiner Swanky', serif;">Send</button>
            </div>
        </div>

        <div class="box buttons-cell">
            <input type="text" id="yt-link" placeholder="Paste your youtube link, e.g. https://www.youtube.com/watch?v=dQw4w9WgXcQ">
            <button id="add-btn" onclick="sendUrl()">Add to queue</button>
            <button id="skip-btn" onclick="skipTrack()">Skip</button>
        </div>

        <div class="box queue-cell">
            <h3 style="margin-top: 0; text-overflow: clip; overflow: hidden; white-space: nowrap; max-width: 100%">Queue</h3>
            <div id="track-list" style="width: 100%; overflow-y: auto; flex-grow: 1;">
                <p style="color: #666; font-size: 14px; text-align: center; margin: auto;">No tracks</p>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
